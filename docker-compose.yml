version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: studymate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studymate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studymate}
      POSTGRES_DB: ${POSTGRES_DB:-studymate}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studymate}"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.20
    container_name: studymate-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    container_name: studymate-ollama
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support removed for now -- Docker Desktop needs extra setup for NVIDIA
    # passthrough on Windows. Running on CPU works fine for now; we'll enable
    # GPU acceleration as a separate step once the app itself is confirmed working.
    # First run: `docker exec -it studymate-ollama ollama pull llama3.1:8b`

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studymate-backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-studymate}:${POSTGRES_PASSWORD:-studymate}@postgres:5432/${POSTGRES_DB:-studymate}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
  uploads_data:
